<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus Projetos</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1e1e2f, #2b5876);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        h1 {
            margin-bottom: 40px;
            font-size: 2.5rem;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 900px;
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            transition: 0.3s;
            cursor: pointer;
            text-decoration: none;
            color: white;
        }

        .card:hover {
            transform: translateY(-10px);
            background: rgba(255, 255, 255, 0.2);
        }

        .card h2 {
            margin-bottom: 10px;
        }

        .card p {
            font-size: 0.9rem;
            opacity: 0.8;
        }

        footer {
            margin-top: 40px;
            font-size: 0.8rem;
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <h1>Meus Projetos</h1>

    <div class="container">

        <a href="/site-colecionador/" class="card">
            <h2>Site de Colecionador de Relógios</h2>
            <p>Atividade 1</p>
        </a>

        <a href="/site-aprendizagem/" class="card">
            <h2>Site de Aprendizagem Java</h2>
            <p>Atividade 2</p>
        </a>

    </div>

    <footer>
        © 2026 - Luiz Gustavo Lorençone Enz | Desenvolvido por você
    </footer>

</body>
</html>
