<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Questão 03 - Alternar Descritivo</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8fafc;
            color: #111827;
        }
        .container {
            max-width: 920px;
            margin: 0 auto;
            padding: 28px 20px;
        }
        header {
            text-align: center;
            margin-bottom: 22px;
        }
        header h1 {
            margin: 0;
            color: #0f172a;
        }
        .button-area {
            text-align: center;
            margin-bottom: 18px;
        }
        .button-area button {
            background-color: #2563eb;
            border: none;
            color: #ffffff;
            padding: 12px 20px;
            border-radius: 999px;
            cursor: pointer;
            font-size: 1rem;
        }
        .button-area button:hover {
            background-color: #1d4ed8;
        }
        .group-card {
            background: #ffffff;
            border-radius: 16px;
            border: 1px solid #dbeafe;
            padding: 22px;
            margin-bottom: 18px;
            box-shadow: 0 12px 24px rgba(15, 23, 42, 0.06);
        }
        .group-card h2 {
            margin-top: 0;
            color: #1d4ed8;
        }
        .group-card ul {
            margin: 10px 0 0 20px;
        }
        .group-card details {
            margin-top: 12px;
            padding: 14px;
            border-radius: 12px;
            background: #eef2ff;
            border-left: 4px solid #60a5fa;
        }
        details summary {
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Questão 03</h1>
            <p>Funcionalidade em JavaScript para alternar conteúdos</p>
        </header>

        <div class="button-area">
            <button onclick="alternarGrupos()" id="toggleButton">Mostrar grupos D, E e F</button>
        </div>

        <div id="gruposContainer"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
