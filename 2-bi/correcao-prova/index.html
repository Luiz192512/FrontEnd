<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hub Correção Prova</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f4f7f6;
            margin: 0;
            padding: 40px;
            color: #333;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        h1 {
            color: #2c3e50;
            text-align: center;
        }

        .cards {
            display: grid;
            gap: 20px;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            margin-top: 30px;
        }

        .card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
            text-align: center;
        }

        .card a {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 16px;
            background: #3498db;
            color: white;
            text-decoration: none;
            border-radius: 6px;
        }

        .card a:hover {
            background: #217dbb;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Hub Correção Prova</h1>
        <div class="cards">
            <div class="card">
                <h2>DIA 1</h2>
                <p>Acesse as questões do DIA 1 com navegação organizada.</p>
                <a href="DIA 1/index.html">Abrir DIA 1</a>
            </div>
            <div class="card">
                <h2>DIA 2</h2>
                <p>Acesse as questões do DIA 2 com navegação organizada.</p>
                <a href="DIA 2/index.html">Abrir DIA 2</a>
            </div>
            <div class="card">
                <h2>DIA 3</h2>
                <p>Acesse as questões do DIA 3 com navegação organizada.</p>
                <a href="DIA 3/index.html">Abrir DIA 3</a>
            </div>
        </div>
    </div>
</body>
</html>
