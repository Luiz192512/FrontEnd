<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Questão 02 - Conversor Dinâmico</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #16a085;
            --bg: #f0f2f5;
            --card: #ffffff;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            background: var(--bg);
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            color: #333333;
        }

        .card {
            width: min(100%, 620px);
            background: var(--card);
            border-radius: 8px;
            border-top: 5px solid var(--accent);
            padding: 28px;
            box-shadow: 0 8px 22px rgba(0, 0, 0, 0.1);
        }

        h1 {
            margin: 0 0 8px;
            color: var(--primary);
            font-size: 1.6rem;
        }

        p {
            margin: 0 0 22px;
            color: #555555;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 16px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 700;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #cfd7df;
            border-radius: 6px;
            font-size: 1rem;
        }

        .actions {
            margin-top: 18px;
        }

        a {
            display: inline-block;
            border-radius: 6px;
            padding: 11px 16px;
            background: #e8edf2;
            color: var(--primary);
            font-weight: 700;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <main class="card">
        <h1>Conversor Dinâmico</h1>
        <p>Digite em um campo e o outro será atualizado automaticamente com duas casas decimais.</p>

        <div class="grid">
            <div>
                <label for="celsius">Celsius (C)</label>
                <input id="celsius" type="number" step="0.1" placeholder="Ex.: 25">
            </div>

            <div>
                <label for="fahrenheit">Fahrenheit (F)</label>
                <input id="fahrenheit" type="number" step="0.1" placeholder="Ex.: 77">
            </div>
        </div>

        <div class="actions">
            <a href="../index.html">Voltar ao hub</a>
        </div>
    </main>

    <script>
        const celsius = document.getElementById("celsius");
        const fahrenheit = document.getElementById("fahrenheit");
        let convertendo = false;

        celsius.addEventListener("input", () => {
            if (convertendo) {
                return;
            }

            convertendo = true;
            fahrenheit.value = celsius.value === "" ? "" : ((Number(celsius.value) * 9 / 5) + 32).toFixed(2);
            convertendo = false;
        });

        fahrenheit.addEventListener("input", () => {
            if (convertendo) {
                return;
            }

            convertendo = true;
            celsius.value = fahrenheit.value === "" ? "" : ((Number(fahrenheit.value) - 32) * 5 / 9).toFixed(2);
            convertendo = false;
        });
    </script>
</body>
</html>
